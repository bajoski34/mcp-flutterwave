<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flutterwave Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        #0A0E27;
      --navy-mid:    #262C55;
      --navy-light:  #2A3362;
      --orange:      #F5A623;
      --orange-deep: #FF5804;
      --blue:        #006AFF;
      --white:       #FFFFFF;
      --off-white:   #F8FAFD;
      --surface:     #F6F9FC;
      --border:      #E9EAF3;
      --text:        #0A0E27;
      --text-mid:    #363A59;
      --text-muted:  #5F6489;
      --text-light:  #8A898B;
      --green:       #009A46;
      --shadow-sm:   0 1px 3px rgba(10,14,39,0.08), 0 1px 2px rgba(10,14,39,0.06);
      --shadow-md:   0 4px 16px rgba(10,14,39,0.10), 0 2px 6px rgba(10,14,39,0.06);
      --shadow-lg:   0 10px 40px rgba(10,14,39,0.14);
      --radius:      14px;
      --radius-sm:   8px;
      --radius-pill: 100px;
    }

    html { font-size: 62.5%; }

    body {
      font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 1.5rem;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: var(--surface);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── HEADER ─────────────────────────────────────── */
    header {
      background: var(--navy);
      padding: 0 2.4rem;
      height: 6.4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: relative;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }

    .header-left { display: flex; align-items: center; gap: 1.2rem; }

    .flw-logo {
      display: flex;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
    }
    .flw-logo-mark {
      width: 3.6rem;
      height: 3.6rem;
      background: var(--orange);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .flw-logo-mark svg { width: 2rem; height: 2rem; }
    .flw-logo-text {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.02em;
    }
    .flw-logo-text span { color: var(--orange); }

    .header-divider {
      width: 1px;
      height: 2rem;
      background: rgba(255,255,255,0.15);
    }
    .header-title {
      font-size: 1.4rem;
      font-weight: 500;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.01em;
    }

    .header-badge {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-pill);
      padding: 0.5rem 1.2rem;
      font-size: 1.2rem;
      font-weight: 500;
      color: rgba(255,255,255,0.75);
    }
    .status-dot {
      width: 0.7rem;
      height: 0.7rem;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 2px rgba(0,154,70,0.25);
      flex-shrink: 0;
    }

    /* ─── TOOLS BAR ───────────────────────────────────── */
    #tools-bar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2.4rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #tools-bar::-webkit-scrollbar { display: none; }

    .tools-label {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tools-sep {
      width: 1px;
      height: 1.4rem;
      background: var(--border);
      flex-shrink: 0;
    }
    .tool-chip {
      font-size: 1.1rem;
      font-weight: 500;
      background: var(--off-white);
      color: var(--navy-mid);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 0.4rem 1rem;
      white-space: nowrap;
      flex-shrink: 0;
      cursor: default;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .tool-chip:hover {
      background: #EEF0FA;
      border-color: var(--navy-light);
      color: var(--navy);
    }

    /* ─── MESSAGES AREA ───────────────────────────────── */
    #chat-wrap {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 2.4rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ─── EMPTY STATE ─────────────────────────────────── */
    #empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.6rem;
      padding: 4rem 2.4rem;
      text-align: center;
    }
    .empty-icon {
      width: 6.4rem;
      height: 6.4rem;
      background: linear-gradient(135deg, var(--orange) 0%, var(--orange-deep) 100%);
      border-radius: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      box-shadow: 0 8px 24px rgba(245,166,35,0.35);
    }
    #empty h2 {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.03em;
    }
    #empty p {
      font-size: 1.5rem;
      color: var(--text-muted);
      max-width: 32rem;
      line-height: 1.65;
    }

    /* ─── SUGGESTIONS ─────────────────────────────────── */
    #suggestions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 2.4rem 2rem;
      flex-shrink: 0;
    }
    .suggestion {
      font-family: inherit;
      font-size: 1.3rem;
      font-weight: 500;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 0.8rem 1.6rem;
      cursor: pointer;
      color: var(--text-mid);
      transition: all 0.15s ease;
      box-shadow: var(--shadow-sm);
    }
    .suggestion:hover {
      background: var(--navy);
      border-color: var(--navy);
      color: var(--white);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    /* ─── MESSAGE BUBBLES ─────────────────────────────── */
    .msg { display: flex; flex-direction: column; max-width: 72%; }
    .msg.user  { align-self: flex-end; align-items: flex-end; }
    .msg.bot   { align-self: flex-start; align-items: flex-start; }

    .msg-meta {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }

    .bubble {
      padding: 1.4rem 1.8rem;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: 1.5rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--navy);
      color: var(--white);
      border-bottom-right-radius: 4px;
      box-shadow: var(--shadow-md);
    }
    .msg.bot .bubble {
      background: var(--white);
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
    }

    /* tool invocation pills */
    .tool-strip {
      margin-top: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .tool-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.15rem;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--off-white);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 0.4rem 1rem;
      width: fit-content;
    }
    .tool-pill-icon {
      width: 1.6rem;
      height: 1.6rem;
      background: var(--orange);
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* embedded UI cards */
    .ui-card {
      margin-top: 1.2rem;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      max-width: 52rem;
      width: 100%;
    }
    .ui-card iframe {
      width: 100%;
      border: none;
      display: block;
      min-height: 28rem;
    }

    /* ─── TYPING INDICATOR ────────────────────────────── */
    .typing .bubble {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1.4rem 1.8rem;
    }
    .typing-dot {
      width: 0.8rem;
      height: 0.8rem;
      background: var(--orange);
      border-radius: 50%;
      animation: flw-bounce 1.3s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.18s; background: var(--orange-deep); }
    .typing-dot:nth-child(3) { animation-delay: 0.36s; background: var(--navy-mid); }

    @keyframes flw-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ─── INPUT ROW ───────────────────────────────────── */
    #input-area {
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 1.6rem 2.4rem;
      flex-shrink: 0;
    }
    #input-row {
      display: flex;
      align-items: flex-end;
      gap: 1.2rem;
      background: var(--off-white);
      border: 1.5px solid var(--border);
      border-radius: 1.6rem;
      padding: 0.8rem 0.8rem 0.8rem 1.8rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #input-row:focus-within {
      border-color: var(--navy-mid);
      box-shadow: 0 0 0 3px rgba(38,44,85,0.08);
      background: var(--white);
    }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 1.5rem;
      color: var(--text);
      resize: none;
      max-height: 12rem;
      line-height: 1.55;
      padding: 0.6rem 0;
    }
    #input::placeholder { color: var(--text-light); }

    #send-btn {
      width: 4rem;
      height: 4rem;
      border: none;
      border-radius: 1.1rem;
      background: var(--orange-deep);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 2px 8px rgba(255,88,4,0.35);
    }
    #send-btn:hover  {
      background: #e64e00;
      box-shadow: 0 4px 14px rgba(255,88,4,0.45);
      transform: translateY(-1px);
    }
    #send-btn:active { transform: scale(0.93); box-shadow: none; }
    #send-btn:disabled { background: var(--border); box-shadow: none; cursor: default; transform: none; }
    #send-btn svg { width: 1.9rem; height: 1.9rem; fill: currentColor; }

    .input-hint {
      margin-top: 0.8rem;
      font-size: 1.1rem;
      color: var(--text-light);
      text-align: center;
    }
    .input-hint kbd {
      font-family: inherit;
      background: var(--border);
      border-radius: 3px;
      padding: 0.1rem 0.4rem;
      font-size: 1rem;
    }
  </style>
</head>
<body>

<!-- ─── HEADER ─────────────────────────────────── -->
<header>
  <div class="header-left">
    <a class="flw-logo" href="#" aria-label="Flutterwave">
      <div class="flw-logo-mark">
        <!-- Flutterwave butterfly / wave mark (simplified SVG) -->
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 2C6.13 2 3 5.13 3 9c0 2.39 1.19 4.5 3 5.78V16a1 1 0 001 1h6a1 1 0 001-1v-1.22C15.81 13.5 17 11.39 17 9c0-3.87-3.13-7-7-7z" fill="white" opacity="0.9"/>
          <path d="M7 9.5C7 8.12 8.12 7 9.5 7S12 8.12 12 9.5 10.88 12 9.5 12 7 10.88 7 9.5z" fill="#FF5804"/>
        </svg>
      </div>
      <span class="flw-logo-text">Flutter<span>wave</span></span>
    </a>
    <div class="header-divider"></div>
    <span class="header-title">AI Assistant</span>
  </div>
  <div class="header-badge">
    <div class="status-dot"></div>
    Connected
  </div>
</header>

<!-- ─── TOOLS BAR ──────────────────────────────── -->
<div id="tools-bar">
  <span class="tools-label">Tools</span>
  <div class="tools-sep"></div>
  <!-- chips injected by JS -->
</div>

<!-- ─── MAIN CHAT ──────────────────────────────── -->
<div id="chat-wrap">
  <div id="messages">
    <div id="empty">
      <div class="empty-icon">💳</div>
      <h2>Endless possibilities for your business</h2>
      <p>Ask me to create payment links, charge customers, manage transfers, check transaction history, and more.</p>
    </div>
  </div>

  <!-- Suggestions shown before first message -->
  <div id="suggestions">
    <button class="suggestion" onclick="send(this.textContent)">Create a checkout link for $50</button>
    <button class="suggestion" onclick="send(this.textContent)">Check a transaction status</button>
    <button class="suggestion" onclick="send(this.textContent)">What tools are available?</button>
    <button class="suggestion" onclick="send(this.textContent)">Initiate a bank transfer</button>
  </div>
</div>

<!-- ─── INPUT AREA ─────────────────────────────── -->
<div id="input-area">
  <div id="input-row">
    <textarea
      id="input"
      rows="1"
      placeholder="Ask about payments, charges, transfers…"
      aria-label="Message input"
    ></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Send (Enter)" aria-label="Send message">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</p>
</div>

<script>
  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('input');
  const sendBtn     = document.getElementById('send-btn');
  const toolsBarEl  = document.getElementById('tools-bar');
  const suggestEl   = document.getElementById('suggestions');
  const emptyEl     = document.getElementById('empty');

  let history = [];
  let busy    = false;

  /* ── auto-grow textarea ── */
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  /* ── load tools into the bar ── */
  fetch('/api/tools')
    .then(r => r.json())
    .then(({ tools }) => {
      if (!tools?.length) return;
      const badge = toolsBarEl.querySelector('.header-badge');
      tools.forEach(t => {
        const chip = document.createElement('span');
        chip.className = 'tool-chip';
        chip.textContent = t.name.replace(/_/g, ' ');
        chip.title = t.description || '';
        toolsBarEl.appendChild(chip);
      });
    })
    .catch(() => {});

  /* ── UI helpers ── */
  function hideEmpty() {
    emptyEl?.remove();
    suggestEl.style.display = 'none';
  }

  function setBusy(val) {
    busy = val;
    sendBtn.disabled = val;
    inputEl.disabled = val;
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function formatTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  /* ── append a message ── */
  function appendMessage(role, text, toolCalls, uiHtmlList) {
    hideEmpty();

    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = role === 'user' ? 'You' : 'Assistant';
    wrap.appendChild(meta);

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(bubble);

    /* tool pills */
    if (toolCalls?.length) {
      const strip = document.createElement('div');
      strip.className = 'tool-strip';
      toolCalls.forEach(tc => {
        const pill = document.createElement('div');
        pill.className = 'tool-pill';
        const dot = document.createElement('div');
        dot.className = 'tool-pill-icon';
        const label = document.createTextNode(tc.name.replace(/_/g, ' '));
        pill.appendChild(dot);
        pill.appendChild(label);
        strip.appendChild(pill);
      });
      wrap.appendChild(strip);
    }

    /* embedded UI cards */
    if (uiHtmlList?.length) {
      uiHtmlList.forEach(html => {
        const card = document.createElement('div');
        card.className = 'ui-card';
        const iframe = document.createElement('iframe');
        iframe.srcdoc = html;
        iframe.setAttribute('sandbox', 'allow-same-origin');
        iframe.setAttribute('title', 'Payment card');
        card.appendChild(iframe);
        wrap.appendChild(card);

        iframe.addEventListener('load', () => {
          try {
            const h = iframe.contentDocument.documentElement.scrollHeight;
            iframe.style.height = (h + 4) + 'px';
          } catch(_) {
            iframe.style.height = '32rem';
          }
        });
        iframe.style.height = '32rem';
      });
    }

    messagesEl.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  /* ── typing indicator ── */
  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot typing';
    wrap.id = 'typing-indicator';

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = 'Assistant';
    wrap.appendChild(meta);

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    [0,1,2].forEach(i => {
      const d = document.createElement('span');
      d.className = 'typing-dot';
      bubble.appendChild(d);
    });
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollBottom();
  }

  function removeTyping() {
    document.getElementById('typing-indicator')?.remove();
  }

  /* ── send helpers ── */
  async function send(text) {
    inputEl.value = text;
    await sendMessage();
  }

  async function sendMessage() {
    if (busy) return;
    const text = inputEl.value.trim();
    if (!text) return;

    setBusy(true);
    inputEl.value = '';
    inputEl.style.height = 'auto';

    appendMessage('user', text);
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history }),
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        appendMessage('bot', '⚠️  ' + (err.error || 'Something went wrong. Please try again.'));
      } else {
        const data = await res.json();
        appendMessage('bot', data.reply, data.tool_calls, data.ui_html);
        history.push({ role: 'user', text });
        history.push({ role: 'assistant', text: data.reply });
        if (history.length > 40) history = history.slice(-40);
      }
    } catch (err) {
      removeTyping();
      appendMessage('bot', '⚠️  Network error. Please check your connection and try again.');
    }

    setBusy(false);
    inputEl.focus();
  }
</script>
</body>
</html>
